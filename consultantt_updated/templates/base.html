{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Готовые юридические документы — купите и получите на email за 5–15 минут." />
  <title>{% block title %}Consultantt — Юридические документы{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#B8962E',
              light: '#D4AF5A',
              dark: '#8B6E1C',
            },
            cream: {
              DEFAULT: '#F5F0E8',
              dark: '#EDE5D4',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>
<body class="min-h-screen font-sans relative">
  <div class="site-bg"></div>
  <div class="site-overlay"></div>

  <div id="app" class="relative z-10 min-h-screen">
    {% block content %}{% endblock %}
  </div>

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
