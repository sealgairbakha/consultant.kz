[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn consultantt.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60 --log-file -"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
